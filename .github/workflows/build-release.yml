name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --name BMLTelemetryViewer main.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bml-telemetry-viewer-exe
          path: dist/BMLTelemetryViewer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: bml-telemetry-viewer-exe
          path: ./release

      - name: Create GitHub Release (draft)
        id: create_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Release ${context.ref_name}`,
              body: `Automated release from GitHub Actions.\nIncludes BMLTelemetryViewer.exe.`,
              draft: true,
              prerelease: false,
            });
            return {
              id: release.data.id,
              upload_url: release.data.upload_url,
            };

      - name: Upload EXE to release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const releaseInfo = JSON.parse(process.env.RELEASE_INFO);

            await github.rest.repos.uploadReleaseAsset({
              url: releaseInfo.upload_url,
              headers: {
                'content-type': 'application/octet-stream',
              },
              name: 'BMLTelemetryViewer.exe',
              data: fs.readFileSync('./release/BMLTelemetryViewer.exe'),
            });
        env:
          RELEASE_INFO: ${{ steps.create_release.outputs.result }}

      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseInfo = JSON.parse(process.env.RELEASE_INFO);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseInfo.id,
              draft: false,
            });
        env:
          RELEASE_INFO: ${{ steps.create_release.outputs.result }}
